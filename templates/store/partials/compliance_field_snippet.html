<div class="form-control mt-4 animate-fade-in">
    <label class="label">
        <span class="label-text font-bold text-primary">{{ label }}</span>
    </label>
    <input type="text" 
           name="{{ field_name }}" 
           placeholder="{{ placeholder }}" 
           class="input input-bordered w-full border-primary" 
           required>
    <label class="label">
        <span class="label-text-alt text-error italic">Required for customs clearance in this region.</span>
    </label>
</div>
