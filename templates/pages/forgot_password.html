{% extends 'base.html' %}
{% load static %}
{% block content %}
<div class="relative mt-16 w-full h-[calc(100dvh-64px)] ">
    <!-- BG_IMAGE -->
    <img src="/media/hero/lavendar.svg" alt="" class="w-full h-full object-cover">

    <!-- CONTENTS -->
    <div class="absolute top-0 left-0 w-full h-full flex flex-col justify-center items-center">
        <!-- title -->
        <h1 class="text-5xl text-primary-content text-shadow-lg text-shadow-base-300 mb-5">
            找 回 密 碼
            <i class="fa-solid fa-key"></i>
        </h1>
        {% include 'includes/alerts.html' %}
        <!-- form -->
        <form action="{% url 'forgot_password' %}" method="POST">
            {% csrf_token %}
            <fieldset class="fieldset bg-primary-content border-base-300 rounded-box w-sm border p-4">
                <label class="label">郵箱 Email</label>
                <input name="email" type="email" class="input w-full" placeholder="請輸入您在本店使用的郵箱地址" />

                <a href="{% url 'login' %}" class="font-medium text-right text-shadow-2xs text-shadow-accent-content"><small>知道密碼？請登入！ | Got password? Please login!</small></a>

                <button type="submit" class="btn btn-neutral mt-4">發送重置鏈接至上述郵箱</button>
            </fieldset>
        </form>
    </div>
</div>
{% endblock %}
