{% extends 'base.html' %}

{% block content %}

    <!-- BANNER -->
    <div class="relative mt-16 w-full">
        {% include 'includes/banner.html' %}
    </div> 

    <!-- MAIN -->
    <div id="cube_display">
        <div id="controls-area">
            <div class="button-grid">
                <button class="btn" onclick="step('y', -5)"><i class="fa-solid fa-angle-left"></i></button>
                <button class="btn" onclick="step('x', 5)"><i class="fa-solid fa-angle-up"></i></button>
                <button class="btn" onclick="step('x', -5)"><i class="fa-solid fa-angle-down"></i></button>
                <button class="btn" onclick="step('y', 5)"><i class="fa-solid fa-angle-right"></i></button>
                <button class="btn auto text-neutral" data-axis="y" data-val="-0.5"><i class="fa-solid fa-angles-left"></i></button>
                <button class="btn auto text-neutral" data-axis="x" data-val="0.5"><i class="fa-solid fa-angles-up"></i></button>
                <button class="btn auto text-neutral" data-axis="x" data-val="-0.5"><i class="fa-solid fa-angles-down"></i></button>
                <button class="btn auto text-neutral" data-axis="y" data-val="0.5"><i class="fa-solid fa-angles-right"></i></button>
                
                <button class="btn" onclick="pause()" style="color: #ff9800;">||</button>
                <button id="reset_btn" class="btn text-2xl font-light" onclick="reset()">↺</button>
            </div>
        </div>
        <div id="cube-viewport" class="flex-shrink-0 min-h-[300px] w-full">
            <div id="info-overlay">
                <div id="initial_msg" class="flex w-full h-auto gap-4 items-stretch text-base-content">
                    <!-- Icon -->
                    <div class="w-1/5 flex items-center justify-center text-base-content">
                        <span class="aspect-square p-5 rounded-[50%] bg-base-300 text-6xl flex items-center justify-center">
                            <i class="fa-solid fa-info"></i>
                        </span>
                    </div>
                    <!-- English -->
                    <div class="w-2/5 flex flex-col justify-start gap-3 items-center text-center">
                        <p class="text-xl font-bold">We can be<br>your trusted patner<br>as...</p>
                        <p class="text-[0.75rem] text-left">* Rotate the cube with above control buttons</p>
                    </div>
                    <!-- Divider -->
                    <div class="w-[1px] bg-warning"></div>
                    <!-- Chinese -->
                    <div class="w-2/5 flex flex-col justify-start gap-3 items-center text-center">
                        <p class="w-full text-xl font-bold">我們可以是<br>您的合作夥伴<br>做為...</p>
                        <p class="w-full text-[0.75rem]">* 點擊控制面板上的按鈕來轉動方塊</p>
                    </div>
                </div>
            </div>

            <div class="scene">
                <div class="rubiksCube" id="cube">
                    <div class="f1 text-9xl"><i class="fa-regular fa-lightbulb opacity-60"></i></div>
                    <div class="f2 text-9xl"><i class="fa-solid fa-laptop-code opacity-60"></i></div>
                    <div class="f3 text-9xl"><i class="fa-solid fa-store opacity-60"></i></div>
                    <div class="f4 text-9xl"><i class="fa-solid fa-palette opacity-60"></i></div>
                    <div class="f5 text-9xl"><i class="fa-regular fa-handshake opacity-60"></i></div>
                    <div class="f6 text-9xl"><i class="fa-solid fa-earth-asia opacity-60"></i></div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL -->  
    <dialog id="detailModal" class="modal">
        <div id="modalContent" class="absolute max-w-[800px] w-9/10 md:w-4/5 aspect-5/9 min-[350px]:aspect-[4/5] sm:aspect-[5/4] md:aspect-[5/3] left-1/2 -translate-x-1/2 top-1/2 -translate-y-1/2">
            <div class="relative bg-black/64 w-full h-full overflow-auto [scrollbar-color:theme(colors.amber.500)_transparent]">
                <!-- content -->
                <div class="m-x-auto absolute left-0 bottom-0 w-full h-auto text-white pl-[1rem] pb-[1rem] sm:pl-[1.5rem] sm:pb-[1.5rem] md:pl-[2rem] md:pb-[2rem] pr-[20%] z-2">
                    <!-- heading -->
                    <h3 class="font-semibold text-[0.9rem] md:text-[1.15rem] mb-[0.5rem]" id="collab_heading"></h3>
                    <!-- description -->
                    <p class="font-semibold text-[0.65rem] md:text-[0.75rem] mb-[1rem] md:mb-[2rem]" id="collab_description"></p>
                    <!-- b-to-b -->
                    <div class="mb-[0.8rem] md:mb-[1.5rem]">

                    </div>
                </div> 
                <!-- svg -->
                <div class="absolute top-0 right-0">
                    <img id="collab_svg" src="" alt="">
                </div>
            </div>
        </div>

        <!-- close button -->
        <button id="filter_modal_close" class="absolute top-[5vw] right-[5vw] text-white font-bold cursor-pointer modal_close flex items-center" onclick="document.getElementById('detailModal').close()">
            <span>Close｜關閉</span>
            <i class="fa-regular fa-circle-xmark text-base sm:text-xl lg:text-3xl"></i>
        </button>
    </dialog>

        function updateLayout() {
            // A small timeout ensures the browser has calculated the parent's true size
            setTimeout(() => {
                const v = document.getElementById('cube-viewport');
                if (!v) return;
                
                // Use offsetWidth for the most accurate layout measurement
                const size = Math.min(v.offsetWidth, v.offsetHeight) * 0.38; 
                document.documentElement.style.setProperty('--cube-size', size + 'px');
            }, 50);
        }

        function step(axis, val) {
            document.getElementById("#initial_msg")?.remove()
            pause();
            if(axis === 'x') rotX += val;
            else rotY += val;
            applyRotation();
        }

        function pause() {
            autoX = 0; autoY = 0;
            document.querySelectorAll('.auto').forEach(b => b.classList.remove('active'));
        }

        function reset() {
            if (!document.getElementById("initial_msg")) {
                const parent_div = document.querySelector("#info-overlay")
                parent_div.innerHTML = ""
                const new_div = document.createElement("div");
                new_div.id = "#initial_msg";
                new_div.innerHTML = initial_msg_html;
                
                parent_div.appendChild(new_div);
            }
            pause(); rotX = -25; rotY = 45; applyRotation();
        }

        function applyRotation() {
            const cube = document.getElementById('cube');
            cube.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
            determineVisibleFace();
        }

        // Part B Logic: Calculate which face is closest to camera
        function determineVisibleFace() {
            const info = document.getElementById('info-overlay');
            
            // At initial 45/45/-25, faces are equal. 
            // We calculate dot product of face normals vs camera vector (0,0,1)
            const radX = rotX * Math.PI / 180;
            const radY = rotY * Math.PI / 180;

            // Simplified visibility vectors based on rotation
            const faces = [
                { id: 0, v: Math.cos(radX) * Math.cos(radY) },           // Front
                { id: 1, v: -Math.cos(radX) * Math.cos(radY) },          // Back
                { id: 2, v: Math.cos(radX) * Math.sin(radY) },           // Right
                { id: 4, v: -Math.cos(radX) * Math.sin(radY) },          // Left
                { id: 5, v: Math.sin(radX) },                            // Top
                { id: 3, v: -Math.sin(radX) }                            // Bottom
            ];

            faces.sort((a, b) => b.v - a.v); //(a, b) => a - b : ascending order, vice versa; NaN : equal

            const newFaceId = faces[0].id;

            // If the top two faces are very close in visibility, show nothing (Initial state)
            if (Math.abs(faces[0].v - faces[1].v) < 0.1) {
                if(!initial_state) info.style.opacity = "0";
                currentFaceId = null; // Reset when in "between" state
            } else {
                // ONLY update the DOM if the face has actually changed
                if (currentFaceId !== newFaceId) {
                    info.style.opacity = "1";
                    info.innerHTML = infoMap[newFaceId];
                    currentFaceId = newFaceId;
                }
            }
        }

        // Continuous Animation Loop
        function animate() {
            if (autoX !== 0 || autoY !== 0) {
                rotX += autoX;
                rotY += autoY;
                applyRotation();
            }
            requestAnimationFrame(animate);
        }
