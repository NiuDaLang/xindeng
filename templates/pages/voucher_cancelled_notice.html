{% extends "base.html" %}
{% block content %}
<div class="min-h-[75dvh] flex items-center justify-center p-4 bg-base-100">
    <div class="card w-full max-w-md bg-base-200 shadow-xl border border-base-300 text-center rounded-2xl p-6 sm:p-8 space-y-5 select-none animate-fade-in text-base-content">
        
        <!-- VISUAL WARNING ICON SHIELD (Matching your clear system alerts patterns) -->
        <div class="bg-warning/10 text-warning w-8/10 aspect-[837/126] flex items-center justify-center m-auto mb-2 p-3">
            <img id="logo_landscape" src="/static/images/logos/logo_full_landscape.svg" alt="logo landscape">
        </div>
        
        <!-- LOCALIZED HEADERS -->
        <div class="space-y-1">
            <h2 class="text-xl font-black text-warning">{{ error_headline }}</h2>
            <span class="text-[0.6rem] uppercase tracking-widest text-base-content/40 font-mono block">Security System Operational Lockout</span>
        </div>

        <!-- BILINGUAL DESCRIPTION BLOCKS -->
        <div class="text-xs space-y-3 text-base-content/80 text-left bg-base-100 p-4 rounded-xl border leading-relaxed border-base-300">
            <p class="font-sans font-medium">{{ error_message }}</p>
            <div class="border-t border-dashed my-2 border-base-content/20 opacity-60"></div>
            <p class="font-sans leading-normal">{{ error_message_cn }}</p>
        </div>
        
        <!-- INTERACTION LINKS ROUTINGS PANEL -->
        <div class="space-y-2 pt-1">
            <a href="{% url 'contact' %}" class="btn btn-sm btn-neutral text-white font-bold w-full rounded-lg py-2 h-auto min-h-0 shadow-sm flex items-center justify-center gap-1.5">
                <i class="fa-solid fa-headset text-[0.7rem]"></i> Contact Support ｜ 聯絡客戶服務
            </a>
            <a href="{% url 'home' %}" class="btn btn-sm btn-outline border-base-content/20 font-bold w-full rounded-lg py-2 h-auto min-h-0 shadow-sm">
                Return to Store ｜ 返回首頁商城
            </a>
        </div>

    </div>
</div>
{% endblock %}
