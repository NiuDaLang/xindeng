{% load socialaccount %}
<div class="flex flex-col items-center gap-4 w-full">
    
    <!-- Use a FORM instead of an <a> tag -->
    <form method="post" action="{% provider_login_url 'google' process=process %}" class="w-full">
        {% csrf_token %}
        <button type="submit" 
           class="h-[3.5rem] btn bg-white text-black border-[#e5e5e5] w-full flex justify-between px-6 py-3 rounded-lg shadow-sm hover:bg-gray-50">
            
            <svg aria-label="Google logo" width="24" height="24" xmlns="http://www.w3.org" viewBox="0 0 512 512">
                <g><path d="m0 0H512V512H0" fill="#fff"></path><path fill="#34a853" d="M153 292c30 82 118 95 171 60h62v48A192 192 0 0190 341"></path><path fill="#4285f4" d="m386 400a140 175 0 0053-179H260v74h102q-7 37-38 57"></path><path fill="#fbbc02" d="m90 341a208 200 0 010-171l63 49q-12 37 0 73"></path><path fill="#ea4335" d="m153 219c22-69 116-109 179-50l55-54c-78-75-230-72-297 55"></path></g>
            </svg>
            
            <span class="font-medium text-right">
                Continue with Google<br>
                <small class="opacity-70">用 Google帳號 登入</small>
            </span>
        </button>
    </form>
</div>
