{% load humanize %}
<title>{{ page_title }}</title>

<div id="dashboard_favorites" class="subpage">
    <!-- hero -->
    <div class="dashboard_hero w-full min-h-72 rounded-2xl text-white relative flex justify-center items-center">
        <!-- season & date -->
        <div class="flex flex-col z-10 p-5">
            {% if solar_term %}
                <div class="solar-timeline">
                    <div class="flex flex-col">
                        <span id="solar_term" class="text-4xl">{{ solar_term }}</span>
                        <span id="solar_term_en" class="text-[16px]">{{ solar_term_en }}</span>
                    </div>
                    {% if next_solar_term %}
                    <div class="solar-arrow-container">
                        <div class="solar-arrow"></div>
                    </div>
                    <div class="flex flex-col">
                        <span id="next_solar_term" class="text-4xl">{{ next_solar_term }}</span>
                        <span id="next_solar_term_en" class="text-[16px]">{{ next_solar_term_en }}</span>
                    </div>
                    {% endif %}
                </div>
            {% endif %}
            <span id="dynamic-date" hx-preserve="true" class="text-sm text-center"></span>
        </div>
        <!-- clock -->
        <div id="persistent-analog-clock" hx-preserve="true" class="flex justify-end z-10">
            <div class="relative z-0 bg-transparent">
                <div class="absolute inset-0 -z-10 bg-[#1b5ac63f] blur-md rounded-full"></div>
                <div class="clock z-10">
                    <div class="clock__second"></div>
                    <div class="clock__minute"></div>
                    <div class="clock__hour"></div>
                    <div class="clock__axis"></div>
                    <section class="clock__indicator" style="--i: 1"></section>
                    <section class="clock__indicator" style="--i: 2"></section>
                    <section class="clock__indicator" style="--i: 3"></section>
                    <section class="clock__indicator" style="--i: 4"></section>

    </div>

    <div id="favorites_wrapper">
        {% include 'accounts/partials/favorites_list.html' with favorites=favorites %}
