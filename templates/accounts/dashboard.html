// 🌟 THE RESOLUTION ENGINE: Pure Vanilla JS Real-time Analog Clock Controller
function renderLocalAnalogClockMetrics() {
    const clockContainer = document.getElementById("persistent-analog-clock");
    if (!clockContainer) return; // Halt instantly if the active tab has no clock container

    const now = new Date();
    const ms = now.getMilliseconds();
    const s = now.getSeconds();
    const m = now.getMinutes();
    const h = now.getHours();

    // 🌟 THE SOLUTION MATH: Restrict rotational metrics strictly within a 360-degree modular circle
    // Includes fractional additions (ms/s) to enable completely fluid hand tracking movement animations!
    const secondDegrees = ((s + ms / 1000) / 60) * 360;
    const minuteDegrees = ((m + s / 60) / 60) * 360;
    const hourDegrees = (((h % 12) + m / 60) / 12) * 360;

    const secondHand = clockContainer.querySelector(".clock__second");
    const minuteHand = clockContainer.querySelector(".clock__minute");
    const hourHand = clockContainer.querySelector(".clock__hour");

    // Execute the clean inline styles transformations natively
    if (secondHand) secondHand.style.transform = `rotate(${secondDegrees}deg)`;
    if (minuteHand) minuteHand.style.transform = `rotate(${minuteDegrees}deg)`;
    if (hourHand) hourHand.style.transform = `rotate(${hourDegrees}deg)`;
}

function initializeAnalogClockLayout() {
    const clockSection = document.getElementById("persistent-analog-clock");
    if (!clockSection) return;

    // Clear numbers out of indicators to keep the face minimalist
    const indicators = clockSection.querySelectorAll(".clock__indicator");
    indicators.forEach(indicator => {
        indicator.innerText = ""; 
    });

    // 🌟 HIGH-PRECISION TIMESTAMP CAPTURE [STEM Calculative Problem Solving]
    const now = new Date();
    const midnight = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    
    // Extract exact milliseconds passed since midnight for sub-second precision
    const totalSecondsToday = (now - midnight) / 1000;

    // 🌟 THE TRUE CHRONOLOGICAL DELAY FORMULA:
    // Extract the exact remainder for each hand's animation duration timeline and multiply by -1
    const secondDelay = (totalSecondsToday % 60) * -1;
    const minuteDelay = (totalSecondsToday % 3600) * -1;
    const hourDelay = (totalSecondsToday % 43200) * -1;

    const secondHand = clockSection.querySelector(".clock__second");
    const minuteHand = clockSection.querySelector(".clock__minute");
    const hourHand = clockSection.querySelector(".clock__hour");

    // Inject your perfectly proportioned negative animation delays --> negative delay == forward!
    if (secondHand) secondHand.style.animationDelay = `${secondDelay}s`;
    if (minuteHand) minuteHand.style.animationDelay = `${minuteDelay}s`;
    if (hourHand)   hourHand.style.animationDelay = `${hourDelay}s`;

    // console.log("⏰ Analog Clock Hands Axis Perfectly Centred & Synchronised.");
}

// Disable the default/'' option of dropdown select tags
function disableDefaultOptions(container = document) {
    let selectFields = container.querySelectorAll('select');
    selectFields.forEach(selectField => {
        let options = selectField.options;
        for (let i = 0; i < options.length; i++) {
            if (options[i].value === "DEFAULT" || options[i].value === "") {
                options[i].disabled = true;
                break; 
            }
        }
    });
}

function updateClock() {
    const clockEl = document.getElementById('dynamic-clock');
    const dateEl = document.getElementById('dynamic-date');
    if (!clockEl && !dateEl) return;

    const userLanguage = navigator.language || "en-AU";
    const now = new Date();
    
    if (dateEl) {
        dateEl.textContent = now.toLocaleString(userLanguage, {
            weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
        });
    }
    if (clockEl) {
        clockEl.textContent = now.toLocaleString(userLanguage, {
            hour: '2-digit', minute: '2-digit', second: '2-digit',
        });
    }
    
    // 🌟 SYNC STEP: Keep your analog clock ticking inside the same master window interval loop
    renderLocalAnalogClockMetrics();
}

    if (parentLi) {
        parentLi.classList.add("is-active");
    }
}

function getZodiacSign(month, day) {
    const months = {Jan: 0, Feb: 1, Mar: 2, Apr: 3, May: 4, Jun: 5, Jul: 6, Aug: 7, Sep: 8, Oct: 9, Nov: 10, Dec: 11};
    const month_num = months[month];
    const zodiacSigns = [
        {sign: "摩羯座 | Capricorn", startMonth: 11, startDay: 22, endMonth: 0, endDay: 19 },
        {sign: "水瓶座 | Aquarius", startMonth: 0, startDay: 20, endMonth: 1, endDay: 18 },
        {sign: "雙魚座 | Pisces", startMonth: 1, startDay: 19, endMonth: 2, endDay: 20 },
        {sign: "牡羊座 | Aries", startMonth: 2, startDay: 21, endMonth: 3, endDay: 19 },
        {sign: "金牛座 | Taurus", startMonth: 3, startDay: 20, endMonth: 4, endDay: 20 },
        {sign: "雙子座 | Gemini", startMonth: 4, startDay: 21, endMonth: 5, endDay: 20 },
        {sign: "巨蟹座 | Cancer", startMonth: 5, startDay: 21, endMonth: 6, endDay: 22 },
        {sign: "獅子座 | Leo", startMonth: 6, startDay: 23, endMonth: 7, endDay: 22 },
        {sign: "處女座 | Virgo", startMonth: 7, startDay: 23, endMonth: 8, endDay: 22 },
        {sign: "天秤座 | Libra", startMonth: 8, startDay: 23, endMonth: 9, endDay: 22 },
        {sign: "天蠍座 | Scorpio", startMonth: 9, startDay: 23, endMonth: 10, endDay: 21 },
        {sign: "射手座 | Sagittarius", startMonth: 10, startDay: 22, endMonth: 11, endDay: 21 },
    ];

    for (const zodiac of zodiacSigns) {
        if ((month_num === zodiac.startMonth && day >= zodiac.startDay) || (month_num === zodiac.endMonth && day <= zodiac.endDay)) {
            return zodiac.sign;
        }
    }
    return "Unknown";
}

function processZodiacExtraction() {
    const birthdayEl = document.querySelector("#birthday");
    const zodiacTarget = document.querySelector("#zodiac");
    if (!birthdayEl || !zodiacTarget) return;

    const birthdayText = birthdayEl.textContent.trim();
    if (birthdayText) {
        const parts = birthdayText.split(" ");
        if (parts.length >= 2) {
            const month = parts[0].replace(".", "");
            const day = parts[1].replace(",", "");
            zodiacTarget.textContent = getZodiacSign(month, Number(day));
        }
    }
}

function flip(flipCard, newNumber, startNumber) {
    if (!flipCard) return;
    const topHalf = flipCard.querySelector(".top");
    if (newNumber === startNumber) return;
    
    const bottomHalf = flipCard.querySelector(".bottom");
    const topFlip = document.createElement("div");
    topFlip.classList.add("top-flip");
    const bottomFlip = document.createElement("div");
    bottomFlip.classList.add("bottom-flip");
    
    topHalf.textContent = startNumber;
    bottomHalf.textContent = startNumber;
    topFlip.textContent = startNumber;
    bottomFlip.textContent = newNumber;
    
    topFlip.addEventListener("animationstart", () => { topHalf.textContent = newNumber; });
    topFlip.addEventListener("animationend", () => { topFlip.remove(); });
    bottomFlip.addEventListener("animationend", () => {
        bottomHalf.textContent = newNumber;
        bottomFlip.remove();
    });
    flipCard.append(topFlip, bottomFlip);
}

// Copy Promo Code

function updateFlashSaleCountdowns() {
    const containers = document.querySelectorAll('[id^="countdown-"]');
    if (containers.length === 0) {
        stopCountdown();
        return;
    }

    const now = new Date().getTime();
    const updateCard = (el, newVal) => {
        if (!el) return;
        const currentVal = el.dataset.prev || "";
        if (currentVal !== String(newVal)) {
            flip(el, newVal, currentVal);
            el.dataset.prev = newVal;
        }
    };
    
    containers.forEach(container => {
        const expiryDate = new Date(container.dataset.expiry).getTime();
        const distance = expiryDate - now;
        
        if (distance < 0) {
            container.innerHTML = "<span class='text-error font-bold text-xs uppercase bg-error/10 p-2 rounded-lg border border-error/20 flex items-center justify-center gap-1'><i class='fa-solid fa-circle-exclamation'></i> Offer Expired ｜ 優惠已過期</span>";
            return;
        }
        
        const els = {
            s1 : container.querySelector('#flip_sec_ones.flip-score-card'),
            s10: container.querySelector('#flip_sec_tens.flip-score-card'),
            m1: container.querySelector('#flip_min_ones.flip-score-card'),
            m10: container.querySelector('#flip_min_tens.flip-score-card'),
            h1: container.querySelector('#flip_hour_ones.flip-score-card'),
            h10: container.querySelector('#flip_hour_tens.flip-score-card'),
            d1: container.querySelector('#flip_day_ones.flip-score-card'),
            d10: container.querySelector('#flip_day_tens.flip-score-card'),
        };

        const s = Math.floor((distance % (1000 * 60)) / 1000);
        const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const d = Math.floor(distance / (1000 * 60 * 60 * 24));

        updateCard(els.s1, s % 10);
        updateCard(els.s10, Math.floor(s / 10));
        updateCard(els.m1, m % 10);
        updateCard(els.m10, Math.floor(m / 10));
        updateCard(els.h1, h % 10);
        updateCard(els.h10, Math.floor(h / 10));
        updateCard(els.d1, d % 10);
        updateCard(els.d10, Math.floor(d / 10));
    });
}

// 🌟 FIXED: Passed 'btnElement' parameter explicitly to avoid legacy scope crashes

function copyPerkCode(up_pk, btnElement) {
    if (!btnElement) return;
    const code_target = document.getElementById(`perk_code_${up_pk}`);
    if (!code_target) return;
    
    const perk_code = code_target.innerText.trim();
    navigator.clipboard.writeText(perk_code).then(() => {
        const originalText = btnElement.innerHTML;
        btnElement.innerText = "Copied! ｜ 已複製";
        btnElement.classList.replace('btn-primary', 'btn-success');
        
        setTimeout(() => {
            btnElement.innerHTML = originalText;
            btnElement.classList.replace('btn-success', 'btn-primary');
        }, 2000);
    }).catch(err => console.error('Failed to copy code token:', err));
}

        console.warn(`Form target ID "${form_id}" not found in current DOM context.`);
        return;
    }

    // 1. Physically reset all standard text, hidden, and email input tags
    const inputs = form.querySelectorAll('input[type="text"], input[type="hidden"], input[type="email"], textarea');
    inputs.forEach(input => {
        // Clear value parameters completely
        input.value = '';
        
        // Remove red border error rings from DaisyUI input labels if present
        const wrapper = input.closest('.input-border') || input.closest('label.input') || input.closest('.join');
        if (wrapper) {
            wrapper.classList.remove('border-error', 'ring-error!', 'input-error');
        }
    });

    // 2. Reset Country and China Province Select dropdown indexes back to default top choices
    const selects = form.querySelectorAll('select');
    selects.forEach(select => {
        select.selectedIndex = 0;
        
        // Clean error indicator wrappers from select nodes
        const wrapper = select.closest('.input-border') || select.closest('label.input') || select.closest('.join');
        if (wrapper) {
            wrapper.classList.remove('border-error', 'ring-error!', 'select-error');
        }
    });

    // 3. Purge all Django backend text error labels below input wrappers
    form.querySelectorAll('.text-error, .label-text-alt.text-error').forEach(errDiv => {
        errDiv.innerHTML = '';
        errDiv.classList.add('hidden');
    });
    
    // Remove any native next-sibling Django text nodes injected by form.errors
    form.querySelectorAll('.label').forEach(label => {
        if (label.classList.contains('text-error') || label.nextElementSibling?.classList.contains('text-error')) {
            label.remove();
        }
    });

    // 4. Force re-evaluate region visibility states natively if function exists
    if (typeof toggleProvinceFields === "function") {
        toggleProvinceFields(form);
    }

    // 5. Uncheck Google verification checkboxes safely
    const verifiedCheckbox = form.querySelector('[id$="is_verified_by_google"]');
    if (verifiedCheckbox) {
        verifiedCheckbox.checked = false;
    }
}

function clearAddressForm() {
    const form = document.getElementById('profile_form');
    if (!form) return;

    const fieldsToClear = [
        'id_address_line_1', 'hidden_address_line_1', 'id_address_line_2', 
        'id_city', 'id_state_province_region', 'id_postal_code',
        'id_google_place_id', 'id_latitude', 'id_longitude'
    ];

    fieldsToClear.forEach(id => {
        const el = form.querySelector(`[id$="${id}"]`);
        if (el) {
            el.value = '';
            const wrapper = el.closest('label.input');
            if (wrapper) wrapper.classList.remove('border-error', 'ring-error!', 'input-error');
        }
    });

    ['id_country', 'id_china_province'].forEach(idSuffix => {
        const selectEl = form.querySelector(`[id$="${idSuffix}"]`);
        if (selectEl) {
            selectEl.selectedIndex = 0;
            selectEl.closest('label')?.classList.remove('border-error', 'ring-error!');
        }
    });

    form.querySelectorAll('.text-error').forEach(errDiv => {
        if (errDiv.id !== "clear_add_btn") {
            if (errDiv.closest('.card') || errDiv.closest('.grid')) { 
                 errDiv.innerHTML = '';
            }
        }
    });

    if (typeof toggleProvinceFields === "function") toggleProvinceFields(form);
    const verifiedCheckbox = document.getElementById('id_is_verified_by_google');
    if (verifiedCheckbox) verifiedCheckbox.checked = false;
    
    const mainAddressField = document.getElementById('id_address_line_1');
    if (mainAddressField) mainAddressField.focus();
}

function updateCounterDisplay() {
    const counter = document.getElementById("search-counter");
    if (!counter) return;
    const hits = document.querySelectorAll('.search-hit');
    const total = hits.length;
    
    if (total === 0) {
        counter.innerText = "0 / 0";
        window.currentMatchIndex = -1;
    } else {
        counter.innerText = `${window.currentMatchIndex + 1} / ${total}`;
    }
}

function toggleSearch(show) {
    const searchInput = document.querySelector('input[name="q"]');
    const container = document.getElementById("search-input-container");
    const trigger = document.getElementById("search-trigger");
    if (!searchInput) return;

    if (!show) {
        searchInput.value = '';
        searchInput.blur();
        if (container) container.classList.add('d-none');
        if (trigger) trigger.classList.remove('d-none');
        updateChatInputState(); 
        htmx.trigger(searchInput, 'keyup');
    } else {
        if (container) container.classList.remove('d-none');
        if (trigger) trigger.classList.add('d-none');
        searchInput.focus();
    }
}

function updateChatInputState() {
    const searchInput = document.querySelector('input[name="q"]');
    const chatInputForm = document.getElementById("chat_msg_input_form");
    if (!searchInput || !chatInputForm) return;

    const isFocused = document.activeElement === searchInput;
    const hasContent = searchInput.value.trim().length > 0;

    if (isFocused || hasContent) {
        chatInputForm.classList.add('opacity-30', 'pointer-events-none');
        chatInputForm.querySelector('textarea').placeholder = "Search active... | 搜索中...";
    } else {
        chatInputForm.classList.remove('opacity-30', 'pointer-events-none');
        chatInputForm.querySelector('textarea').placeholder = "Max 1,000 characters | 限 1,000 個字元";
    }
}

function navigateSearch(direction) {
    const hits = document.querySelectorAll('.search-hit');
    if (hits.length === 0) return;

    if (window.currentMatchIndex !== -1 && hits[window.currentMatchIndex]) {
        hits[window.currentMatchIndex].classList.remove('active-hit');
    }

    window.currentMatchIndex = (window.currentMatchIndex + direction + hits.length) % hits.length;
    const target = hits[window.currentMatchIndex];
    if (target) {
        target.classList.add('active-hit');
        target.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
    updateCounterDisplay();
}

function setActiveMember(memberId, clickedElement) {
    const receiverInput = document.getElementById('receiver_id_input');
    if (receiverInput) receiverInput.value = memberId;

    document.querySelectorAll('.member-filter-btn').forEach(btn => {
        btn.classList.remove('btn-primary', 'text-white');
        btn.classList.add('bg-white', 'text-black');
    });

    if (clickedElement) {
        clickedElement.classList.remove('bg-white', 'text-black');
        clickedElement.classList.add('btn-primary', 'text-white');
    }
}


/** 
 * Block 6: Persistent Solar Term WebSocket Engine
 */

function terminateActiveWebSocket() {
    if (window.solarWebSocketInstance) {
        window.solarWebSocketInstance.onmessage = null;
        window.solarWebSocketInstance.close();
        window.solarWebSocketInstance = null;
        console.log("🔌 Solar Term WebSocket Connection Terminated Cleanly.");
    }
}

function initializeSolarWebSocket() {
    terminateActiveWebSocket(); // Protect Daphne pool depletion leaks
    
    const termDisplay = document.getElementById('solar_term');
    const termDisplayEn = document.getElementById('solar_term_en');
    const nextTermDisplay = document.getElementById('next_solar_term');
    const nextTermDisplayEn = document.getElementById('next_solar_term_en');
    
    if (!termDisplay && !termDisplayEn) return;

    let currentTerm = termDisplay ? termDisplay.innerText : "";

    const wsProtocol = window.location.protocol === "https:" ? "wss://" : "ws://";
    const solarUrl = wsProtocol + window.location.host + '/ws/solar/';
    
    window.solarWebSocketInstance = new WebSocket(solarUrl);

    window.solarWebSocketInstance.onmessage = function(e) {
        const data = JSON.parse(e.data);
        
        // 🌟 REALTIME RE-ALIGNMENT: Force updates into UI text channels seamlessly
        if (data.term && data.term !== currentTerm) {
            currentTerm = data.term;
            if (termDisplay) termDisplay.innerText = data.term;
            if (termDisplayEn) termDisplayEn.innerText = data.term_en;
            if (nextTermDisplay && data.next_term) nextTermDisplay.innerText = data.next_term;
            if (nextTermDisplayEn && data.next_term_en) nextTermDisplayEn.innerText = data.next_term_en;
            console.log(`☯️ Solar Shift Notification Captured: ${data.term} is now active.`);
        }
    };
}

document.body.addEventListener('htmx:afterSwap', (evt) => {
    if (!evt.detail || !evt.detail.target) return;
    if (evt.detail.target.classList.contains('unread-count-badge')) return;

    const target = evt.detail.target;

    if (target.id === 'dashboard-content') {
        if (document.getElementById('persistent-analog-clock')) {
            initializeAnalogClockLayout();
        }
        const subpageEl = target.querySelector('.subpage');
        if (!subpageEl) return;
        
        const subpage = subpageEl.id;
        disableDefaultOptions(target);

        if (document.getElementById('dynamic-clock') || document.getElementById('dynamic-date')) {
            updateClock();
            if (!window.dashboardClockInterval) {
                window.dashboardClockInterval = setInterval(updateClock, 1000);
            }
        }

        if (document.getElementById('solar_term')) {
            initializeSolarWebSocket();
        }

        processZodiacExtraction();

        if (subpage === 'dashboard_profile') {
            setTimeout(() => initAddressAutoCompleteByPage('dashboard_profile'), 20);
        } else if (subpage === 'dashboard_addresses') {
            initAddressAutoCompleteByPage('dashboard_addresses');
        } else if (subpage === 'dashboard_offers') {
            startCountdown();
        }

    } else if (target.id === "modal_content_area") {
        const form = target.querySelector('form');
        if (form) {
            const address_input = form.querySelector('#id_address_line_1');
            if (address_input) {
                address_input.addEventListener('input', function() {
                    if (this.value.trim() === "") {
                        if (typeof preAutoComplete === "function") preAutoComplete();
                        if (typeof initAutoComplete === "function") initAutoComplete(form.id);
                    }
                });
            }
            if (typeof initRegionLogic === "function") initRegionLogic(form.id); 
            if (typeof toggleProvinceFields === "function") toggleProvinceFields(form);
        }
    } else if (target.id === "chat_message_list") {
        window.currentMatchIndex = -1;
        updateCounterDisplay();
        updateChatInputState();  

        const searchInput = document.querySelector('input[name="q"]');
        if (searchInput && searchInput.value.trim() !== "") {
            navigateSearch(1);
        }
    }
});

    if (window.Swal) {
        Swal.fire({
            title: 'Updated! ｜ 更新成功', text: 'Address book has been updated.',
            icon: 'success', toast: true, position: 'top-end', timer: 3000, showConfirmButton: false
        });
    }
});

document.body.addEventListener('htmx:beforeRequest', (event) => {
    if (event.detail.elt.closest('dialog')) {
        if (document.activeElement && typeof document.activeElement.blur === "function") {
            document.activeElement.blur();
        }
    }
});

document.body.addEventListener('htmx:afterOnLoad', (event) => {
    if (event.detail.target.closest('dialog')) {
        if (document.activeElement && typeof document.activeElement.blur === "function") {
            document.activeElement.blur();
        }
    }
});

document.body.addEventListener('updateBanner', function(evt) {
    const bannerLink = document.querySelector("#banner-breadcrumb-link");
    if (bannerLink) {
        bannerLink.innerText = evt.detail.title;
        bannerLink.href = evt.detail.url;
    }
});

document.body.addEventListener('change', function(e) {
    if (e.target.name === 'country') {
        const form = e.target.closest('form');
        if (form && typeof toggleProvinceFields === "function") toggleProvinceFields(form);
    }
});

document.body.addEventListener('input', function(e) {
    const field = e.target;
    const wrapper = field.closest('.input-border') || field.closest('.join') || field.closest('label.input');
    
    if (wrapper) {
        wrapper.classList.remove('border-error', 'ring-error!', 'input-error', 'select-error');
        const errorLabel = wrapper.nextElementSibling;
        if (errorLabel && (errorLabel.classList.contains('label') || errorLabel.classList.contains('text-error'))) {
            errorLabel.remove();
        }
    }

    if (field.closest('#profile_form')) {
        if (field.name === 'country' && typeof toggleProvinceFields === "function") {
            toggleProvinceFields(field.closest('form'));
        }
    }   
});

document.body.addEventListener('closeModal', function(evt) {
    const modalId = evt.detail.value;
    const modal = document.getElementById(modalId);
    if (modal) {
        const form = modal.querySelector('form');
        if (form && typeof clearAddressBookForm === "function") clearAddressBookForm(form.id);
        modal.close();
    }
});

document.addEventListener("DOMContentLoaded", () => {
    disableDefaultOptions();
    
    const subpage_wrapper = document.getElementById('dashboard-content');
    if (subpage_wrapper) {
        const subpageEl = subpage_wrapper.querySelector('.subpage');
        if (subpageEl) {
            const subpage = subpageEl.id;
            if (subpage === 'dashboard_profile' || subpage === 'dashboard_addresses') {
                initAddressAutoCompleteByPage(subpage);
            } else if (subpage === 'dashboard_offers') {
                startCountdown();
            }
        }
    }

    if (document.getElementById('navbar')) htmx.process(document.querySelector('#navbar'));
    if (document.getElementById('dashboard_sidebar')) htmx.process(document.querySelector('#dashboard_sidebar'));

    const searchInput = document.querySelector('input[name="q"]');
    if (searchInput) {
        searchInput.addEventListener('input', updateChatInputState);
        searchInput.addEventListener('focus', updateChatInputState);
        searchInput.addEventListener('blur', () => { setTimeout(updateChatInputState, 150); });
    }

    // 🌟 UNIFIED LIFECYCLE ENGAGEMENT PASS: Boot Clocks and Extract Sidebar Static Zodiac Metrics
    if (document.getElementById('persistent-analog-clock')) {
        initializeAnalogClockLayout();
    }
    
    if (document.getElementById('dynamic-clock') || document.getElementById('dynamic-date')) {
        updateClock();
        window.dashboardClockInterval = setInterval(updateClock, 1000);
    }
    if (document.getElementById('solar_term')) {
        initializeSolarWebSocket();
    }
    
    // Runs once on sidebar loading - stays static irrespective of subpage shifts
    const sidebarBirthday = document.getElementById('sidebar-birthday-source');
    if (sidebarBirthday && sidebarBirthday.textContent.trim()) {
        const parts = sidebarBirthday.textContent.trim().split(" ");
        if (parts.length >= 2) {
            const month = parts[0].replace(".", "");
            const day = parts[1].replace(",", "");
            const zodiacSign = getZodiacSign(month, Number(day));
            const zodiacTarget = document.getElementById('zodiac');
            if (zodiacTarget) zodiacTarget.textContent = zodiacSign;
        }
    }
});
