// *** General ***
// disable the default/'' option of select tag
function disableDefaultOptions(container = document) {
    let selectFields = container.querySelectorAll('select');
    selectFields.forEach(selectField => {
        let options = selectField.options;
        for (let i = 0; i < options.length; i++) {
            if (options[i].value === "DEFAULT" || options[i].value === "") {
                options[i].disabled = true;
                break; 
            }
        }
    });
}

// digital & date
function updateClock() {
    const userLanguage = navigator.language; // e.g., "en-US"
    const now = new Date();
    const formattedDate = now.toLocaleString(userLanguage, {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric',
    });
    const formattedTime = now.toLocaleString(userLanguage, {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
    });
    
    document.getElementById('dynamic-date') ? document.getElementById('dynamic-date').textContent = formattedDate : null
    document.getElementById('dynamic-clock') ? document.getElementById('dynamic-clock').textContent = formattedTime : null
}

// update sidebar subpage link
function updateActiveLink(element) {
    // 1. Find all dashboard items
    const items = document.querySelectorAll('.dashboard-item');
    
    // 2. Remove the active border from all of them
    items.forEach(li => {
        li.classList.remove("is-active");
    });

    // 3. Add the active border to the parent <li> of the clicked link
    const parentLi = element.closest("li");
    if (parentLi) {
        parentLi.classList.add("is-active");
    }
}    

// user zodiac
function getZodiacSign(month, day) {
    const months = {Jan: 0, Feb: 1, Mar: 2, Apr: 3, May: 4, Jun: 5, Jul: 6, Aug: 7, Sep: 8, Oct: 9, Nov: 10, Dec: 11,}
    const month_num = months[month]
    const zodiacSigns = [
        {sign: "摩羯座 | Capricorn", startMonth: 11, startDay: 22, endMonth: 0, endDay: 19 },
        {sign: "水瓶座 | Aquarius", startMonth: 0, startDay: 20, endMonth: 1, endDay: 18 },
        {sign: "雙魚座 | Pisces", startMonth: 1, startDay: 19, endMonth: 2, endDay: 20 },
        {sign: "牡羊座 | Aries", startMonth: 2, startDay: 21, endMonth: 3, endDay: 19 },
        {sign: "金牛座 | Taurus", startMonth: 3, startDay: 20, endMonth: 4, endDay: 20 },
        {sign: "雙子座 | Gemini", startMonth: 4, startDay: 21, endMonth: 5, endDay: 20 },
        {sign: "巨蟹座 | Cancer", startMonth: 5, startDay: 21, endMonth: 6, endDay: 22 },
        {sign: "獅子座 | Leo", startMonth: 6, startDay: 23, endMonth: 7, endDay: 22 },
        {sign: "處女座 | Virgo", startMonth: 7, startDay: 23, endMonth: 8, endDay: 22 },
        {sign: "天秤座 | Libra", startMonth: 8, startDay: 23, endMonth: 9, endDay: 22 },
        {sign: "天蠍座 | Scorpio", startMonth: 9, startDay: 23, endMonth: 10, endDay: 21 },
        {sign: "射手座 | Sagittarius", startMonth: 10, startDay: 22, endMonth: 11, endDay: 21 },
    ];

    for (const zodiac of zodiacSigns) {
        if (
            (month_num === zodiac.startMonth && day >= zodiac.startDay) ||
            (month_num === zodiac.endMonth && day <= zodiac.endDay)
        ) {
            return zodiac.sign
        }
    }
    return "Unknown"; // Should not happen with valid dates
}

// *** Offers ***
// Countdown
// Count Down to Offer Expiry Flip Card
let countdownTimer = null;

function stopCountdown() {
    if (countdownTimer){
        clearInterval(countdownTimer);
        countdownTimer = null
    }
}

function startCountdown() {
    stopCountdown()
    updateFlashSaleCountdowns()
    countdownTimer = setInterval(updateFlashSaleCountdowns, 1000)
}

function flip(flipCard, newNumber, startNumber) {
    const topHalf = flipCard.querySelector(`.top`)
    // console.log('newNumber, startNumber: ', newNumber, startNumber)
    if (newNumber === startNumber) {
        // console.log('same number')
        return
    }
    
    const bottomHalf = flipCard.querySelector(".bottom");
    const topFlip = document.createElement("div");
    topFlip.classList.add("top-flip");
    const bottomFlip = document.createElement("div")
    bottomFlip.classList.add("bottom-flip");
    
    topHalf.textContent = startNumber;
    bottomHalf.textContent = startNumber;
    topFlip.textContent = startNumber;
    bottomFlip.textContent = newNumber;
    
    topFlip.addEventListener("animationstart", e => {
        topHalf.textContent = newNumber
    })
    topFlip.addEventListener("animationend", e => {
        topFlip.remove()
    })
    bottomFlip.addEventListener("animationend", e => {
        bottomHalf.textContent = newNumber
        bottomFlip.remove()
    })
    flipCard.append(topFlip, bottomFlip);
}

function updateFlashSaleCountdowns() {
    const containers = document.querySelectorAll('[id^="countdown-"]');
    if (containers.length === 0) {
        stopCountdown()
        return
    }

    const now = new Date().getTime();

    const updateCard = (el, newVal) => {
        if (!el) return;
        const currentVal = el.dataset.prev || "";
        if (currentVal !== String(newVal)){
            flip(el, newVal, currentVal)
            el.dataset.prev = newVal
        }
    }
    
    containers.forEach(container => {
        const expiryDate = new Date(container.dataset.expiry).getTime();
        const distance = expiryDate - now;
        if (distance < 0) {
            container.innerHTML = "<span class='text-error font-bold'>OFFER EXPIRED｜優惠已過期</span>";
            stopCountdown()
            return;
        }
        
        const els = {
            s1 : container.querySelector('#flip_sec_ones'),
            s10: container.querySelector('#flip_sec_tens'),
            m1: container.querySelector('#flip_min_ones'),
            m10: container.querySelector('#flip_min_tens'),
            h1: container.querySelector('#flip_hour_ones'),
            h10: container.querySelector('#flip_hour_tens'),
            d1: container.querySelector('#flip_day_ones'),
            d10: container.querySelector('#flip_day_tens'),
        }

        const s = Math.floor((distance % (1000 * 60)) / 1000);
        const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const d = Math.floor(distance / (1000 * 60 * 60 * 24));

        updateCard(els.s1, s % 10);
        updateCard(els.s10, Math.floor(s / 10));
        updateCard(els.m1, m % 10);
        updateCard(els.m10, Math.floor(m / 10));
        updateCard(els.h1, h % 10);
        updateCard(els.h10, Math.floor(h / 10));
        updateCard(els.d1, d % 10);
        updateCard(els.d10, Math.floor(d / 10));
    })
}

    const form = document.getElementById('profile_form');

    const fieldsToClear = [

        'id_address_line_2',

        'id_latitude',
        'id_longitude'
    ];

    fieldsToClear.forEach(id => {
        const el = form.querySelector(`[id$="${id}"]`);
        if (el) {
            // Clear text/hidden inputs
            el.value = '';
            // Remove error styling if present
            const wrapper = el.closest('label.input');
            if (wrapper) wrapper.classList.remove('border-error', 'ring-error!', 'input-error');

    // Remove all error message text below inputs
    form.querySelectorAll('.text-error').forEach(errDiv => {
        if(errDiv.id !== "clear_add_btn") {

                 errDiv.innerHTML = '';
            }

    toggleProvinceFields(form);
    
    // Uncheck the verification toggle
    const verifiedCheckbox = document.getElementById('id_is_verified_by_google');
    if (verifiedCheckbox) verifiedCheckbox.checked = false;

    // Focus back on the first input
    document.getElementById('id_address_line_1').focus();

// initAutoComplete for address form upon arrival on the subpage content
function initAddressAutoCompleteByPage(subpage){
    const addressInput = document.getElementById('id_address_line_1')
    
    if (!addressInput) return;
    
    if(subpage == 'dashboard_profile') {
        // Use optional chaining or check existence before calling .trim()
        const value = addressInput.value || "";
        if (value.trim() === "") {
            const form = document.getElementById('profile_form');
            if (form) {
                preAutoComplete()
                initAutoComplete(form.id);
                initRegionLogic(form.id);
                toggleProvinceFields(form);
            }
        }        
        
    } else if(subpage == 'dashboard_addresses') {
        if (addressInput.form) {
            if(addressInput.form.id != 'update_address_form'){
                preAutoComplete()
                initAutoComplete(addressInput.form.id)
                initRegionLogic('create_address_form')
                toggleProvinceFields(addressInput.form);
            }
        }
    }
}


// GOOGLE
// clear address forms (in dashboard/addresses)
function clearAddressBookForm(form_id) {
    const form = document.getElementById(form_id);
    if (!form) return;
    
    form.reset();
        
    const manualFields = [
        'id_recipient_first_name', 'id_recipient_last_name', 
        'id_mobile_number', 
        'id_address_line_1', 'hidden_address_line_1', 'id_address_line_2', 
        'id_city', 'id_state_province_region', 
        'id_postal_code', 
        'id_google_place_id', 'id_latitude', 'id_longitude'
    ];

    manualFields.forEach(idSuffix => {
        // Search inside form ONLY
        const el = form.querySelector(`[id$="${idSuffix}"]`);
        if (el) {
            el.value = '';
            el.closest('label')?.classList.remove('input-error', 'border-error', 'border-error!', 'ring-error!');
        }
    });

    // Fix the Selects (Crucial Change here)
    // We search for the select within the form, not the whole document
    const selects = ['id_label', 'id_mobile_area', 'id_china_province', 'id_country'];
    
    selects.forEach(idSuffix => {
        const selectEl = form.querySelector(`[id$="${idSuffix}"]`);
        if (selectEl) {
            selectEl.selectedIndex = 0; // Forces it back to the "Label/Placeholder" option
            // If you use DaisyUI/Select, you might need to trigger a change event
            selectEl.dispatchEvent(new Event('change'));
        }
    });

    // Clear Google Checkbox
    const verifiedCheckbox = form.querySelector('input[type="checkbox"]');
    if (verifiedCheckbox) verifiedCheckbox.checked = false;

    // Clear custom error labels that Django rendered
    form.querySelectorAll('.label').forEach(err => err.remove());
    
    // Clear any red borders
    form.querySelectorAll('.input-border').forEach(el => el.classList.remove('border-error'));

    // Re-run the toggle to ensure it reverts to default country view
    toggleProvinceFields(form);
}

function confirmDelete(button) {
    Swal.fire({
        title: 'Are you sure?｜您確定嗎？',
        text: "You won't be able to revert this!｜刪除後將無法還原此項目！",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#d33', // Red for delete
        cancelButtonColor: '#3085d6',
        confirmButtonText: 'Yes, delete it!｜確定刪除！',
        cancelButtonText: 'Cancel｜取消'
    }).then((result) => {
        if (result.isConfirmed) {
            // Manually trigger the HTMX request
            htmx.trigger(button, 'confirmed');
        }
    })
}

// Help
let currentMatchIndex = -1;

// Function to refresh the "X / Y" display
function updateCounterDisplay() {
    const counter = document.getElementById("search-counter");
    const hits = document.querySelectorAll('.search-hit');
    const total = hits.length;
    
    if (total === 0) {
        counter.innerText = "0 / 0";
        currentMatchIndex = -1;
    } else {
        // Display current position (1-based) / Total
        counter.innerText = `${currentMatchIndex + 1} / ${total}`;
    }
}

function toggleSearch(show) {
    const searchInput = document.querySelector('input[name="q"]');
    
    const trigger = document.getElementById("search-trigger");
    const container = document.getElementById("search-input-container");

    if (!show) {
        searchInput.value = '';
        searchInput.blur(); // Remove focus so the lock logic sees it's inactive
        
        // Hide UI containers as before...
        document.getElementById("search-input-container").classList.add('d-none');
        
        // Force immediate unlock
        updateChatInputState(); 
        
        // Reset the chat to show all messages again
        htmx.trigger(searchInput, 'keyup');
    } else {
        container.classList.remove('d-none');
        if (trigger) trigger.classList.add('d-none');
        searchInput.focus();
    }
}

function updateChatInputState() {
    const searchInput = document.querySelector('input[name="q"]');
    const chatInputForm = document.getElementById("chat_msg_input_form");
    
    if (!searchInput || !chatInputForm) return;

    const isFocused = document.activeElement === searchInput;
    const hasContent = searchInput.value.trim().length > 0;

    // If search is active OR has text, lock the chat
    if (isFocused || hasContent) {
        chatInputForm.classList.add('opacity-30', 'pointer-events-none');
        chatInputForm.querySelector('textarea').placeholder = "Search active... | 搜索中...";
    } else {
        chatInputForm.classList.remove('opacity-30', 'pointer-events-none');
        chatInputForm.querySelector('textarea').placeholder = "Max 1,000 characters | 限 1,000 個字元";
    }
}

function navigateSearch(direction) {
    const hits = document.querySelectorAll('.search-hit');
    if (hits.length === 0) return;

    // Reset previous hit styling
    if (currentMatchIndex !== -1 && hits[currentMatchIndex]) {
        hits[currentMatchIndex].classList.remove('active-hit'); // Use the CSS class from earlier
    }

    // Move index
    currentMatchIndex = (currentMatchIndex + direction + hits.length) % hits.length;

    // Highlight and Scroll
    const target = hits[currentMatchIndex];
    target.classList.add('active-hit');
    target.scrollIntoView({ behavior: 'smooth', block: 'center' });

    updateCounterDisplay();
}

function setActiveMember(memberId, clickedElement) {
    // 1. Update the hidden input for the form
    const receiverInput = document.getElementById('receiver_id_input');
    if (receiverInput) {
        receiverInput.value = memberId;
    }

    // 2. Remove active classes from all member buttons
    document.querySelectorAll('.member-filter-btn').forEach(btn => {
        btn.classList.remove('btn-primary', 'text-white');
        btn.classList.add('bg-white', 'text-black');
    });

    // 3. Add active classes to the clicked button
    clickedElement.classList.remove('bg-white', 'text-black');
    clickedElement.classList.add('btn-primary', 'text-white');
}

// 24-Solar Term
let currentTerm = "{{ solar_term }}";
let currentTermEn = "{{ solar_term_en }}";
const termDisplay = document.getElementById('solar_term');
const termDisplayEn = document.getElementById('solar_term_en');

const wsProtocol = window.location.protocol === "https:" ? "wss://" : "ws://";
const socket = new WebSocket(wsProtocol + window.location.host + '/ws/solar/');

socket.onmessage = function(e) {
    const data = JSON.parse(e.data);
    if (data.term !== currentTerm) {
        currentTerm = data.term;
        currentTermEn = data.term_en
        termDisplay.innerText = currentTerm;
        termDisplayEn.innerText = currentTermEn
    }
};

// Actions upon Input in forms
document.body.addEventListener('input', function(e) {
    // Error removal upon filling in
    const field = e.target;
    // 1. Remove red border from the input's wrapper
    const wrapper = field.closest('.input-border') || field.closest('.join');
    if (wrapper) {
        wrapper.classList.remove('border-error', 'ring-error!', 'input-error', 'select-error');
        
        // 2. Remove the specific Django error message <span> below it
        const errorLabel = wrapper.nextElementSibling;
        if (errorLabel && errorLabel.classList.contains('label')) {
            errorLabel.remove();
        }
    }

    // Profile Form
    if (field.closest('#profile_form')) {
        // 1. Toggle China vs Region
        if (field.name === 'country') {
            toggleProvinceFields(field.closest('form'));
        }
    
        // 2. Clear Red Errors on Input
        const wrapper = field.closest('label.input');
        if (wrapper) {
            wrapper.classList.remove('border-error', 'ring-error!', 'input-error');
            // Find the error div (usually the next sibling) and hide it
            const errorDiv = wrapper.nextElementSibling;
            if (errorDiv && errorDiv.classList.contains('text-error')) {
                errorDiv.classList.add('hidden');
            }
        }
    };   
});

// Run upon Document Onload

    const subpage_wrapper = document.getElementById('dashboard-content')

        const subpage = document.querySelector('#dashboard-content .subpage').id;
        console.log('subpage: ', subpage)
        if(subpage == 'dashboard_profile') {
            initAddressAutoCompleteByPage('dashboard_profile')
        } else if (subpage == 'dashboard_addresses') {
            initAddressAutoCompleteByPage('dashboard_addresses')
        } else if (subpage == 'dashboard_offers') {
            console.log("offers!")
            startCountdown()
        }
    }

    // help
    // Ensure HTMX is aware of the elements in the header and sidebar
    htmx.process(document.querySelector('#navbar'));
    htmx.process(document.querySelector('#dashboard_sidebar'));

    const searchInput = document.querySelector('input[name="q"]');
    if(searchInput) {
        searchInput.addEventListener('input', updateChatInputState);
        searchInput.addEventListener('focus', updateChatInputState);
        
        // Use a small delay on blur so it doesn't flicker when clicking arrows
        searchInput.addEventListener('blur', () => {
            setTimeout(updateChatInputState, 150);
        });
    
        const currentReceiverId = document.getElementById('receiver_id_input').value;
        const activeBtn = document.getElementById(`member-btn-${currentReceiverId}`);
        if (activeBtn) {
            setActiveMember(currentReceiverId, activeBtn);

});

// Run every time HTMX swaps in new [subpage] content
document.body.addEventListener('htmx:afterSwap', function(event){
    if(!event.detail || !event.detail.target) return;
    if (event.detail.target.classList.contains('unread-count-badge')) {
        return; // Ignore unread count updates in this specific listener
    }

    const target = event.detail.target;

    if (target.id === 'dashboard-content') {  
        const firstChild = target.firstElementCHild;

        if(!firstChild) {
            console.warn("Dashboard content swapped but no child element found.");
            return;
        }
        
        const subpage = firstChild.id
        disableDefaultOptions(target);

        // GOOGLE
        if(subpage == 'dashboard_profile') {
            // 1. Init Google Autocomplete
            // Note: address_form.html uses id_address_line_1         
            setTimeout(() => initAddressAutoCompleteByPage('dashboard_profile'), 10);

        } else if (subpage == 'dashboard_addresses') {
            initAddressAutoCompleteByPage('dashboard_addresses')

        } else if (subpage == 'dashboard_offers') {
            startCountdown();
        }

    } else if (target.id === "modal_content_area") {
        console.log("modal_content_area")
        const form = target.querySelector('form');
        if (form) {
            const address_input = form.querySelector('#id_address_line_1');
            address_input.addEventListener('input', function() {
                if (this.value.trim() === "") {
                    preAutoComplete();
                    initAutoComplete(form.id);
                }
            });
            initRegionLogic(form.id); 
            toggleProvinceFields(form);
        }
    } else if (target.id === "chat_message_list") {
        // Help search - CRITICAL: Reset counter when HTMX finishes swapping new search results
        currentMatchIndex = -1; // Reset position on new search

        // Force a re-calculation of hits in the new HTML
        updateCounterDisplay();
        
        // Unlock/Lock logic check
        updateChatInputState();  

        // Optional: Auto-jump to the first hit immediately
        const searchInput = document.querySelector('input[name="q"]');
        if (searchInput && searchInput.value.trim() !== "") {
            navigateSearch(1);
        }
    }
});

// Listen for when any DaisyUI/HTML dialog opens (get rid of 'blocked area-hidden')
document.body.addEventListener('htmx:beforeRequest', (event) => {
    // Check if the request is coming from inside a modal
    if (event.detail.elt.closest('dialog')) {
        if (document.activeElement) {
            document.activeElement.blur();
        }
    }
});

document.body.addEventListener('htmx:afterOnLoad', (event) => {
    // If the element being loaded is inside a modal or is a modal
    if (event.detail.target.closest('dialog')) {
        // Blur the button that triggered the request
        if (document.activeElement) {
            document.activeElement.blur();
        }
    }
});
