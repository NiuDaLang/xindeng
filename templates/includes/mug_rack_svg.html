        animation-fill-mode: forwards;
        animation-delay: 1000ms;
    }

        20% {opacity: 0;}
        100% {opacity: 1;}
    }
    @keyframes fadeOut {
        20% {opacity: 1;}
        30%, 100% {opacity: 0;}
    }

</style>
